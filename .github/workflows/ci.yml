name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run Clojure test suite
        run: clojure -M:test test/scripts/run_tests.clj

      - name: Compile Node runtime
        run: npx shadow-cljs compile node

      - name: Run JavaScript tests
        run: npm test

      - name: Compile browser IDE
        run: npx shadow-cljs compile browser
