<script>
(function () {
  // Workaround: Quarto sometimes emits data-mode="light" on the dark
  // bootstrap stylesheet when both themes share an SCSS include, which
  // breaks the color-scheme toggle. Re-derive data-mode from the href
  // and reconcile the body class with the active stylesheet.
  document
    .querySelectorAll('link.quarto-color-scheme#quarto-bootstrap')
    .forEach(function (el) {
      if (el.classList.contains('quarto-color-scheme-extra')) return;
      var isDark = /bootstrap-dark/.test(el.getAttribute('href') || '');
      el.setAttribute('data-mode', isDark ? 'dark' : 'light');
    });
  var altActive = document.querySelector(
    'link#quarto-bootstrap.quarto-color-scheme.quarto-color-alternate[rel="stylesheet"]'
  );
  if (altActive) {
    document.body.classList.add('quarto-dark');
    document.body.classList.remove('quarto-light');
  }
})();
document.addEventListener("DOMContentLoaded", function () {
  function adjustNumber(el) {
    const text = el.textContent.trim();
    const parts = text.split(".");
    const value = parseInt(parts[0], 10);
    if (!Number.isNaN(value) && value > 4) {
      parts[0] = String(value - 4);
      el.textContent = parts.join(".");
    }
  }

  const indexLinks = document.querySelectorAll('a[href$="index.html"]');
  indexLinks.forEach(function (link) {
    const num = link.querySelector(".chapter-number");
    if (num) num.remove();
    const title = link.querySelector(".chapter-title");
    if (title) {
      title.textContent = "Home";
    }
  });

  document.querySelectorAll(".header-section-number").forEach(adjustNumber);
  document.querySelectorAll(".toc-section-number").forEach(adjustNumber);
});
</script>
