format:
  pdf:
    output-file: beyond-code-print.pdf
    pdf-engine: pdflatex
    keep-tex: true
    listings: true
    documentclass: scrbook
    classoption: [twoside, openright]
    number-sections: true
    toc: false
    toc-depth: 2
    fig-pos: "tbp"
    fig-cap-location: bottom
    tbl-cap-location: top
    fontsize: 10pt
    papersize: "6in,9in"
    linestretch: 1.03
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - top=0.78in
      - bottom=0.85in
      - inner=0.90in
      - outer=0.72in
      - bindingoffset=0.12in
      - headsep=0.22in
      - footskip=0.32in
    include-in-header: preamble-print.tex
    include-before-body: frontmatter-print.tex
