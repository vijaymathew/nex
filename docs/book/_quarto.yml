    - glossary.md
    - index_terms.md
    - references.md

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    css: styles.css
    code-copy: true
    code-overflow: wrap
  pdf:
    output-file: beyond-code.pdf
    pdf-engine: pdflatex
    documentclass: scrbook
    number-sections: true
    toc: true
    toc-depth: 2
    include-in-header: preamble.tex
  epub:
    output-file: beyond-code.epub
    toc: true
    toc-depth: 2
    number-sections: true

crossref:
  chapters: true

bibliography: references.bib

execute:
  freeze: auto
