project:
  type: book

book:
  title: "Programming with Nex"
  subtitle: "A Practical Introduction to Software Engineering Through a Contract-First Language"
  author: "Vijay Mathew"
  date: today
  date-format: "MMMM D, YYYY"
  chapters:
    - index.md
    - preface.md
    - part: "Part I — Getting Started"
      chapters:
        - chapter_1.md
        - chapter_2.md
        - chapter_3.md
        - chapter_4.md
        - chapter_5.md
    - part: "Part II — Functions and Structure"
      chapters:
        - chapter_6.md
        - chapter_7.md
        - chapter_8.md
    - part: "Part III — Organising Data"
      chapters:
        - chapter_9.md
        - chapter_10.md
        - chapter_11.md
    - part: "Part IV — Classes and Objects"
      chapters:
        - chapter_12.md
        - chapter_13.md
        - chapter_14.md
        - chapter_15.md
    - part: "Part V — Design by Contract"
      chapters:
        - chapter_16.md
        - chapter_17.md
        - chapter_18.md
        - chapter_19.md
        - chapter_20.md
    - part: "Part VI — Errors and Recovery"
      chapters:
        - chapter_21.md
        - chapter_22.md
    - part: "Part VII — Working at Scale"
      chapters:
        - chapter_23.md
        - chapter_24.md
        - chapter_25.md
    - part: "Part VIII — Putting It Together"
      chapters:
        - chapter_26.md
        - chapter_27.md
        - chapter_29.md
        - chapter_28.md
  appendices:
    - appendix_a.md
    - appendix_b.md
    - appendix_c.md
    - appendix_d.md
    - appendix_e.md

format:
  html:
    theme:
      light: [cosmo, ../nex-book.scss]
      dark: [darkly, ../nex-book.scss]
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    css: styles.css
    include-after-body: renumber-html.html
    code-copy: true
    code-overflow: wrap
  pdf:
    output-file: programming-with-nex.pdf
    pdf-engine: pdflatex
    documentclass: scrbook
    number-sections: true
    toc: true
    toc-depth: 2
    include-in-header: preamble.tex
  epub:
    output-file: programming-with-nex.epub
    toc: true
    toc-depth: 2
    number-sections: true

crossref:
  chapters: true

execute:
  freeze: auto
