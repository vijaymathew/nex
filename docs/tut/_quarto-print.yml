project:
  output-dir: _book/print

book:
  chapters:
    - preface.md
    - part: "Part I — Getting Started"
      chapters:
        - chapter_1.md
        - chapter_2.md
        - chapter_3.md
        - chapter_4.md
        - chapter_5.md
    - part: "Part II — Functions and Structure"
      chapters:
        - chapter_6.md
        - chapter_7.md
        - chapter_8.md
    - part: "Part III — Organising Data"
      chapters:
        - chapter_9.md
        - chapter_10.md
        - chapter_11.md
    - part: "Part IV — Classes and Objects"
      chapters:
        - chapter_12.md
        - chapter_13.md
        - chapter_14.md
        - chapter_15.md
    - part: "Part V — Design by Contract"
      chapters:
        - chapter_16.md
        - chapter_17.md
        - chapter_18.md
        - chapter_19.md
        - chapter_20.md
    - part: "Part VI — Errors and Recovery"
      chapters:
        - chapter_21.md
        - chapter_22.md
    - part: "Part VII — Working at Scale"
      chapters:
        - chapter_23.md
        - chapter_24.md
        - chapter_25.md
    - part: "Part VIII — Putting It Together"
      chapters:
        - chapter_26.md
        - chapter_27.md
        - chapter_28.md
    - appendix_a.md
    - appendix_b.md
    - appendix_c.md
    - appendix_d.md
    - appendix_e.md

format:
  pdf:
    output-file: programming-with-nex-print.pdf
    pdf-engine: pdflatex
    listings: true
    documentclass: scrbook
    classoption: [twoside, openright]
    number-sections: true
    toc: false
    toc-depth: 2
    fig-pos: "tbp"
    fig-cap-location: bottom
    tbl-cap-location: top
    fontsize: 10pt
    papersize: "6in,9in"
    linestretch: 1.03
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - top=0.78in
      - bottom=0.85in
      - inner=0.90in
      - outer=0.72in
      - bindingoffset=0.12in
      - headsep=0.22in
      - footskip=0.32in
    include-in-header: preamble-print.tex
    include-before-body: frontmatter-print.tex
